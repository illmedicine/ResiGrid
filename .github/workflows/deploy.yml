name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: resigrid-deploy
  cancel-in-progress: false

jobs:
  deploy-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Cloud Functions (TypeScript → lib/)
        run: npm run build
        working-directory: functions

      - name: Write functions .env from secrets
        run: |
          cat > functions/.env << 'ENVEOF'
          SQUARE_ENV=production
          SQUARE_OAUTH_REDIRECT_URI=https://resigrid.co/pm/payouts/callback
          CLAIM_BASE_URL=https://resigrid.co/claim/
          SQUARE_APPLICATION_ID=sq0idp--js2-VRPmjasfeN7tp039A
          SQUARE_LOCATION_ID=LA83XYXM6FADM
          ENVEOF
          [ -n "$SQUARE_ACCESS_TOKEN" ] && echo "SQUARE_ACCESS_TOKEN=$SQUARE_ACCESS_TOKEN" >> functions/.env
          [ -n "$SQUARE_APPLICATION_SECRET" ] && echo "SQUARE_APPLICATION_SECRET=$SQUARE_APPLICATION_SECRET" >> functions/.env
          echo "Functions .env written"
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_APPLICATION_SECRET: ${{ secrets.SQUARE_APPLICATION_SECRET }}

      - name: Build (static export for Firebase Hosting)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Deploy Firestore rules + indexes
        run: npx firebase deploy --only firestore --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firebase Hosting (resigrid.co)
        run: npx firebase deploy --only hosting --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Cloud Functions
        run: npx firebase deploy --only functions --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules (CoinDrop bucket)
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('firebase.json', 'utf8'));
            cfg.storage.rules = 'coindrop.storage.rules';
            fs.writeFileSync('firebase.json', JSON.stringify(cfg, null, 2));
          "
          npx firebase deploy --only storage --project coindrop-e39de --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
