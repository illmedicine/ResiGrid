name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: resigrid-deploy
  cancel-in-progress: false

jobs:
  deploy-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Fix Cloud Build service account IAM permissions
        run: |
          node << 'NODEEOF'
          const https = require('https');
          const qs = require('querystring');
          const CLIENT_ID = '563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com';
          const CLIENT_SECRET = 'j9iVZfS8kkCEFUPaAeJV0sAi';
          const PROJECT_ID = 'resigrid-96c9c';
          const PROJECT_NUMBER = '518982670558';
          const CB_SA = PROJECT_NUMBER + '@cloudbuild.gserviceaccount.com';
          const ROLES = [
            'roles/cloudbuild.builds.builder',
            'roles/artifactregistry.writer',
            'roles/storage.admin',
            'roles/run.admin',
            'roles/logging.logWriter',
            'roles/iam.serviceAccountUser',
          ];
          function jsonReq(hostname, path, method, body, token) {
            return new Promise((resolve, reject) => {
              const b = body ? JSON.stringify(body) : '';
              const h = { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(b) };
              if (token) h['Authorization'] = 'Bearer ' + token;
              const r = https.request({ hostname, path, method, headers: h }, res => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch { resolve(d); } });
              });
              r.on('error', reject);
              if (b) r.write(b);
              r.end();
            });
          }
          async function main() {
            const tb = qs.stringify({ client_id: CLIENT_ID, client_secret: CLIENT_SECRET, refresh_token: process.env.FIREBASE_TOKEN, grant_type: 'refresh_token' });
            const tRes = await new Promise((resolve, reject) => {
              const r = https.request({ hostname: 'oauth2.googleapis.com', path: '/token', method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Content-Length': Buffer.byteLength(tb) } }, res => {
                let d = ''; res.on('data', c => d += c);
                res.on('end', () => resolve(JSON.parse(d)));
              });
              r.on('error', reject); r.write(tb); r.end();
            });
            if (!tRes.access_token) { console.error('Token error:', JSON.stringify(tRes)); process.exit(1); }
            const token = tRes.access_token;
            console.log('Access token obtained');
            const policy = await jsonReq('cloudresourcemanager.googleapis.com', '/v1/projects/' + PROJECT_ID + ':getIamPolicy', 'POST', {}, token);
            if (!policy.bindings) { console.error('Policy error:', JSON.stringify(policy)); process.exit(1); }
            const member = 'serviceAccount:' + CB_SA;
            let changed = false;
            for (const role of ROLES) {
              let b = policy.bindings.find(x => x.role === role);
              if (!b) { b = { role, members: [] }; policy.bindings.push(b); }
              if (!b.members.includes(member)) { b.members.push(member); console.log('Granted', role); changed = true; }
            }
            if (!changed) { console.log('IAM bindings already correct — no changes needed'); return; }
            const sr = await jsonReq('cloudresourcemanager.googleapis.com', '/v1/projects/' + PROJECT_ID + ':setIamPolicy', 'POST', { policy }, token);
            if (sr.error) { console.error('setIamPolicy error:', JSON.stringify(sr.error)); process.exit(1); }
            console.log('IAM policy updated (' + (sr.bindings?.length ?? '?') + ' bindings)');
          }
          main().catch(e => { console.error('IAM fix error:', e.message); process.exit(1); });
          NODEEOF
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Write functions .env from secrets
        run: |
          cat > functions/.env << 'ENVEOF'
          SQUARE_ENV=production
          SQUARE_OAUTH_REDIRECT_URI=https://resigrid.co/pm/payouts/callback
          CLAIM_BASE_URL=https://resigrid.co/claim/
          SQUARE_APPLICATION_ID=sq0idp--js2-VRPmjasfeN7tp039A
          SQUARE_LOCATION_ID=LA83XYXM6FADM
          ENVEOF
          [ -n "$SQUARE_ACCESS_TOKEN" ] && echo "SQUARE_ACCESS_TOKEN=$SQUARE_ACCESS_TOKEN" >> functions/.env
          [ -n "$SQUARE_APPLICATION_SECRET" ] && echo "SQUARE_APPLICATION_SECRET=$SQUARE_APPLICATION_SECRET" >> functions/.env
          echo "Functions .env written"
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_APPLICATION_SECRET: ${{ secrets.SQUARE_APPLICATION_SECRET }}

      - name: Build (static export for Firebase Hosting)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Deploy Firestore rules + indexes (ResiGrid)
        run: npx firebase deploy --only firestore --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Cloud Functions
        run: npx firebase deploy --only functions --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firebase Hosting (resigrid.co)
        run: npx firebase deploy --only hosting --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules (CoinDrop bucket)
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('firebase.json', 'utf8'));
            cfg.storage.rules = 'coindrop.storage.rules';
            fs.writeFileSync('firebase.json', JSON.stringify(cfg, null, 2));
          "
          npx firebase deploy --only storage --project coindrop-e39de --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
