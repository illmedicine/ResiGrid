name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-firebase:
    # Firebase rules deploy — does NOT block the site from going live.
    # deploy-pages runs independently; this job is best-effort.
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Deploy Firestore rules + indexes to the ResiGrid project
      - name: Deploy Firestore rules + indexes (ResiGrid)
        run: npx firebase deploy --only firestore --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # Deploy Storage rules to CoinDrop bucket (ResiGrid uses this for all file uploads)
      # Temporarily swap rules file so firebase.json points at the correct rules for CoinDrop
      - name: Deploy Storage rules (CoinDrop bucket)
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('firebase.json', 'utf8'));
            cfg.storage.rules = 'coindrop.storage.rules';
            fs.writeFileSync('firebase.json', JSON.stringify(cfg, null, 2));
          "
          npx firebase deploy --only storage --project coindrop-e39de --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
