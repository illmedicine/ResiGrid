name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: resigrid-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: resigrid.co

  deploy-firebase:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Deploy Firestore rules + indexes (ResiGrid)
        run: npx firebase deploy --only firestore --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules (CoinDrop bucket)
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('firebase.json', 'utf8'));
            cfg.storage.rules = 'coindrop.storage.rules';
            fs.writeFileSync('firebase.json', JSON.stringify(cfg, null, 2));
          "
          npx firebase deploy --only storage --project coindrop-e39de --token "$FIREBASE_TOKEN" --non-interactive
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
